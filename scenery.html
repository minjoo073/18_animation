<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사운드 | Inner Stillness</title>
    <link rel="stylesheet" href="subpage.css">
</head>
<body>
    <div class="star-layer"></div>
    <header>
        <h1><a href="index.html"><img src="image/logo1.png" alt="Inner Stillness"></a></h1>
        <nav>
            <ul class="gnb">
                <li><a href="study.html">서제</a></li>
                <li><a href="works.html">작품</a></li>
                <li><a href="records.html">기록</a></li>
                <li class="active"><a href="scenery.html">사운드</a></li>
                <li><a href="connect.html">연결</a></li>
            </ul>
        </nav>
        <audio src="audio/massobeats_dainty.m4a" controls></audio>
    </header>

    <main class="sub-wrap page-enter">
        <section class="hero hero-sound">
            <div>
                <p class="eyebrow">Soundscape</p>
                <h2>Peaceful<br>Rooms</h2>
            </div>
            <div class="intro-card">
                <span>사운드</span>
                <strong>장면과 소리로 마음을 쉬게 하는 방</strong>
                <p>원하는 분위기를 선택하면 화면의 장면과 백색소음이 함께 흐르는 페이지입니다.</p>
            </div>
        </section>

        <section class="page-section sound-room" aria-label="선택형 사운드스케이프">
            <input type="radio" name="soundscape" id="sound-rain" checked>
            <input type="radio" name="soundscape" id="sound-night">
            <input type="radio" name="soundscape" id="sound-wind">
            <div class="sound-visual">
                <div class="sound-orb" aria-hidden="true"></div>
                <div class="frequency-field" aria-hidden="true">
                    <span></span><span></span><span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span><span></span><span></span>
                </div>
                <article>
                    <span>Breath Frequency</span>
                    <h3>소리의 리듬에 맞춰 호흡을 늦추세요</h3>
                    <p>선택한 사운드에 따라 파동의 간격과 속도가 달라집니다. 눈은 흐름을 따라가고, 호흡은 조금씩 길어집니다.</p>
                    <audio src="audio/massobeats_dainty.m4a" controls></audio>
                </article>
            </div>
            <div class="sound-options">
                <label for="sound-rain"><strong>Soft Rain</strong><span>생각을 천천히 씻어내고 싶을 때</span></label>
                <label for="sound-night"><strong>Star Night</strong><span>잠들기 전 몸을 이완하고 싶을 때</span></label>
                <label for="sound-wind"><strong>Slow Wind</strong><span>답답한 마음에 공간이 필요할 때</span></label>
            </div>
        </section>
    </main>
</body>
</html>
