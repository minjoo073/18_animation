<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inner Stillness | Meditation Space</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=block');

        *{margin: 0;padding: 0;}
        li{list-style: none;}
        a {text-decoration: none; color: #000;}
        img {vertical-align: top;}
        html, body {height: 100%;}

       /*  html, body {height: 100%;} 배경 사이즈 크기 맞추기 위함*/

       /*  body{overflow-y: hidden;} /* 이미지 크기가 커서 스크롤 바가 생길 경우 */
       /* vh는 이미지가 작을 때 (높이) 사용 */
  
        @font-face {
            font-family: 'GyeonggiMillenniumBackground';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-3@1.0/Batang_Regular.woff') format('woff');
            font-weight: 400;
            font-display: block;
        }

        @font-face {
            font-family: 'GyeonggiMillenniumBackground';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-3@1.0/Batang_Bold.woff') format('woff');
            font-weight: 700;
            font-display: block;
        }
        body {font-family: 'GyeonggiMillenniumBackground'; overflow: hidden; background: #14142d;}
        body::before {content: ""; position: fixed; inset: 0; background: radial-gradient(circle at 48% 22%, rgba(226, 204, 255, 0.28), transparent 34%), radial-gradient(circle at 14% 82%, rgba(142, 164, 235, 0.22), transparent 30%), radial-gradient(circle at 88% 32%, rgba(255, 221, 158, 0.12), transparent 26%), linear-gradient(180deg, rgba(17, 17, 45, 0.04), rgba(15, 14, 36, 0.3)); pointer-events: none; z-index: 3; animation: ambientGlow 12s ease-in-out infinite alternate;}
        @keyframes ambientGlow {
            0% {opacity: 0.82; transform: scale(1);}
            100% {opacity: 1; transform: scale(1.02);}
        }
        .bg_box {position: absolute; top: 0; width: 100%; height: 100%; overflow: hidden;}

        .bg_box .bg1 .sky { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); animation: rain 90s linear infinite; transform-origin: center center; opacity: 0.9;}
        @keyframes rain {
            from {transform: translate(-50%, -50%) rotate(0deg);}
            to {transform: translate(-50%, -50%) rotate(360deg);}
        }
        
        .bg_box .bg1 .img2 { width: 100%; height: 100vh; position: absolute;left: 0;top: 0;z-index: 2; animation: bg1 15s forwards; animation-delay: 1ms;}
        /* @keyframes bg1 {
            0% {height: 150%;}
            10%{height: 100%;}
        } */


        header {position: absolute; max-width: 1180px; left: 50%; top: 22px; transform: translateX(-50%); display: flex; justify-content: space-between; align-items:center; width: calc(100% - 100px); padding: 0 8px; box-sizing: border-box; z-index: 5;}
        header h1 {width: 64px;}
        header h1 img {width: 100%;}
        header nav {}
        header nav .gnb {display: flex; flex-direction: row; flex-wrap: nowrap; align-items: center; gap: 34px;}
        header nav .gnb li {font-size: 20px; letter-spacing: -0.02em; transition: 0.25; text-shadow: 0 0 18px rgba(8, 7, 24, 0.95), 0 0 28px rgba(226, 204, 255, 0.2); white-space: nowrap;}
        header nav .gnb li a{color: rgba(255, 255, 255, 0.9); display: block; padding: 8px 16px; border-radius: 999px;}

        header nav .gnb:hover  li{transform: scale(0.9);opacity: 0.7;}
        header nav .gnb li:hover {transform: scale(1.1); opacity: 1;}
        header nav .gnb li:hover a {color: #ffdd9e; background: rgba(255, 255, 255, 0.08);}
        header audio {width: 138px; height: 24px; border-radius: 999px; opacity: 0.52; background: transparent; filter: invert(1) sepia(10%) saturate(45%) hue-rotate(210deg) brightness(0.98); box-shadow: none; transition: 0.3s;}
        header audio:hover {opacity: 0.82;}
        header audio::-webkit-media-controls-panel {background: rgba(22, 19, 45, 0.04);}
        header audio::-webkit-media-controls-current-time-display,
        header audio::-webkit-media-controls-time-remaining-display {font-size: 10px;}
        header audio::-webkit-media-controls-play-button {filter: brightness(0.62) saturate(50%);}

        .textbox {width: 100%; position: absolute; left: 50%; top: 29%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 20px; text-align: center; z-index: 4; }

        .textbox h1 {font-family: 'Cormorant Garamond', serif; font-size: 64px; font-weight: 500; letter-spacing: 0.16em; line-height: 1.35; padding: 0 20px; color: #f4effb; animation:text 2.8s ease-out; position: relative; display: flex; flex-direction: column; align-items: center; gap: 18px; text-shadow: 0 0 34px rgba(228, 222, 234, 0.42);}
        /* .textbox h1 span {gap: 10px;} */
        .textbox a {font-size: 17px; letter-spacing: 0.22em; line-height: 1.45; padding: 13px 38px; color: #f7f2ff; border: 1px solid rgba(232, 222, 255, 0.52); border-radius: 999px; background: linear-gradient(135deg, rgba(246, 231, 199, 0.2), rgba(79, 73, 121, 0.42)); box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.08), 0 0 28px rgba(174, 159, 225, 0.34); backdrop-filter: blur(8px); animation:text 2.8s ease-out 0.2s both; transition: 0.3s; }
        .textbox a:hover {color: #fff4d9; border-color: rgba(255, 216, 151, 0.86); background: linear-gradient(135deg, rgba(255, 210, 139, 0.25), rgba(53, 48, 95, 0.66)); transform: translateY(-3px); box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1), 0 0 36px rgba(255, 205, 130, 0.38);}


         @keyframes text { 
            0% {transform: translateY(34px) scale(0.96); opacity: 0; filter: blur(8px);}
            55% {opacity: 0.72; filter: blur(2px);}
            100% {transform: translateY(0) scale(1); opacity: 1; filter: blur(0);}
        }


        .container { position: absolute; left: 50%; top: 74%; transform: translateX(-50%); width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; text-align: center; z-index: 4; }
        .container .content {line-height: 34px;}
        .container .content p {font-size: 16px; letter-spacing: -0.04em; color: rgba(248, 243, 255, 0.86); padding: 10px; text-shadow: 0 0 18px rgba(20, 18, 42, 0.8);}

        .star_box{}
        .star_box .star1{width: 100%; position: absolute; background: url("image/star.png"); height: 100vh; left: 0;top: 0; animation: star1 24s infinite linear; background-size: 62%; opacity: 0.46; mix-blend-mode: screen; filter: blur(0.4px); pointer-events: none; z-index: 3; }

        @keyframes star1 {
            0% {background-position: -120px -160px;}
            50% {opacity: 0.34;}
            100% {background-position: 180px 520px;}
        }

        /* .star_box .star2{width: 100%; position: absolute; background: url("image/star.png"); height: 100vh; left: 0;top: 0; animation: star2 3s infinite linear; background-size: 30%;}

        @keyframes star2 {
            0% {background-position: 0 0;}
            100% {background-position: 400px 900px;}
        } */

/*         .star_box .star3{width: 100%; position: absolute; background: url("image/star.png"); height: 100vh; left: 0;top: 0; animation: star3 5s infinite linear;}

        @keyframes star3 {
            0% {background-position: 0 0;}
            100% {background-position: 1000px 900px;}
        } */




        /* .textbox li span:nth-child(2){animation-delay:} */

        @media (max-width: 980px) {
            body {overflow-y: auto;}
            .wrap {min-height: 100vh;}
            header {width: calc(100% - 32px); top: 16px; flex-wrap: wrap; justify-content: center; gap: 10px 18px;}
            header h1 {width: 54px;}
            header nav {order: 3; width: 100%;}
            header nav .gnb {justify-content: center; gap: 10px;}
            header nav .gnb li {font-size: 16px;}
            header nav .gnb li a {padding: 6px 10px;}
            header audio {width: 128px;}
            .textbox {top: 28%; gap: 16px;}
            .textbox h1 {font-size: clamp(38px, 9vw, 58px); letter-spacing: 0.1em; gap: 10px;}
            .textbox a {font-size: 14px; padding: 11px 28px;}
            .container {top: 70%; width: calc(100% - 32px);}
            .container .content {line-height: 30px;}
            .container .content p {font-size: 14px;}
        }

        @media (max-width: 560px) {
            header nav .gnb {gap: 2px;}
            header nav .gnb li {font-size: 14px;}
            .textbox {top: 30%;}
            .textbox h1 {font-size: 34px; letter-spacing: 0.08em;}
            .textbox h1 span {display: block;}
            .container {top: 68%;}
        }
    </style>
</head>

            </nav>
            <audio src="audio/massobeats_dainty.m4a" controls></audio>
        </header>


        <div class="textbox">  
            <h1>
                <span>M E E T&nbsp;&nbsp;Y O U R</span> 
                <span>I N N E R&nbsp;&nbsp;S T I L L N E S S</span> 
            </h1>
            <a href="study.html">S T A R T<br>M E D I T A T I O N</a>
        </div>
        <div class="container">
            <div class="content">
                <p>우리는 모두 각자의 내면에 광활한 우주를 품고 있습니다.  <br> 어둠 속에 숨겨진 진정한 나를 마주하고, 쏟아지는 별빛 속에서 답을 찾아보세요. <br>당신의 깊은 내면이 들려주는 고요한 이야기에 집중할 시간입니다.</p>
            </div>
        </div>
        <div class="bg_box">
            <div class="bg1">
                <div class="sky"><img src="image/bg1.png" alt=""></div>
                <img src="image/bg2.png" alt="" class="img2">

        <div class="star_box">
            <div class="star1"></div>
            <div class="star2"></div>
        </div>
    </div>
</body>
