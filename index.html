<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inner Stillness | Meditation Space</title>
    <script>
        const previousPage = document.referrer ? new URL(document.referrer) : null;
        const currentPage = new URL(window.location.href);
        const cameFromSubpage = previousPage
            && previousPage.origin === currentPage.origin
            && previousPage.pathname.replace(/\/$/, '/index.html') !== currentPage.pathname.replace(/\/$/, '/index.html');

        if (cameFromSubpage) {
            document.documentElement.classList.add('skip-opening');
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=block');

        *{margin: 0;padding: 0;}
        li{list-style: none;}
        a {text-decoration: none; color: #000;}
        img {vertical-align: top;}
        html, body {height: 100%;}

       /*  html, body {height: 100%;} 배경 사이즈 크기 맞추기 위함*/

       /*  body{overflow-y: hidden;} /* 이미지 크기가 커서 스크롤 바가 생길 경우 */
       /* vh는 이미지가 작을 때 (높이) 사용 */
  
        @font-face {
            font-family: 'GyeonggiMillenniumBackground';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-3@1.0/Batang_Regular.woff') format('woff');
            font-weight: 400;
            font-display: block;
        }

        @font-face {
            font-family: 'GyeonggiMillenniumBackground';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-3@1.0/Batang_Bold.woff') format('woff');
            font-weight: 700;
            font-display: block;
        }
        body {font-family: 'GyeonggiMillenniumBackground'; overflow: hidden; background: #14142d;}
        body::before {content: ""; position: fixed; inset: 0; background: radial-gradient(circle at 48% 22%, rgba(226, 204, 255, 0.28), transparent 34%), radial-gradient(circle at 14% 82%, rgba(142, 164, 235, 0.22), transparent 30%), radial-gradient(circle at 88% 32%, rgba(255, 221, 158, 0.12), transparent 26%), linear-gradient(180deg, rgba(17, 17, 45, 0.04), rgba(15, 14, 36, 0.3)); pointer-events: none; z-index: 3; animation: ambientGlow 12s ease-in-out infinite alternate;}
        @keyframes ambientGlow {
            0% {opacity: 0.82; transform: scale(1);}
            100% {opacity: 1; transform: scale(1.02);}
        }
        .opening {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 50% 46%, rgba(226, 204, 255, 0.2), transparent 28%),
                        #11112b;
            animation: openingFade 2.2s ease 1.9s forwards;
            pointer-events: none;
        }

        .opening img {
            width: 96px;
            opacity: 0;
            animation: logoBreathe 1.9s ease forwards;
            filter: drop-shadow(0 0 28px rgba(255, 221, 158, 0.22));
        }

        .opening::after {
            content: "";
            position: absolute;
            width: 156px;
            height: 156px;
            border: 1px solid rgba(255, 221, 158, 0.24);
            border-radius: 50%;
            animation: openingRing 1.9s ease forwards;
        }

        @keyframes logoBreathe {
            0% {opacity: 0; transform: scale(1.18); filter: blur(5px) drop-shadow(0 0 18px rgba(255, 221, 158, 0.12));}
            34% {opacity: 1; transform: scale(1);}
            100% {opacity: 0.86; transform: scale(0.62); filter: blur(0) drop-shadow(0 0 28px rgba(255, 221, 158, 0.2));}
        }

        @keyframes openingRing {
            0% {opacity: 0; transform: scale(0.72);}
            42% {opacity: 0.75; transform: scale(1);}
            100% {opacity: 0; transform: scale(1.34);}
        }

        @keyframes openingFade {
            to {opacity: 0; visibility: hidden;}
        }
        .skip-opening .opening {display: none;}
        .wrap {position: relative; min-height: 100vh; --drift-x: 0px; --drift-y: 0px;}
        .bg_box {position: absolute; top: 0; width: 100%; height: 100%; overflow: hidden;}

        .bg_box .bg1 .sky { position: absolute; left: 50%; top: 50%; transform: translate(calc(-50% + var(--drift-x)), calc(-50% + var(--drift-y))); animation: skyBreathe 14s ease-in-out infinite alternate; transform-origin: center center; opacity: 0.9; transition: transform 0.8s ease-out;}
        @keyframes skyBreathe {
            from {opacity: 0.82; filter: saturate(0.92) brightness(0.95);}
            to {opacity: 0.96; filter: saturate(1.04) brightness(1.02);}
        }
        
        .bg_box .bg1 .img2 { width: 100%; height: 100vh; position: absolute;left: 0;top: 0;z-index: 2; animation: bg1 15s forwards; animation-delay: 1ms;}
        /* @keyframes bg1 {
            0% {height: 150%;}
            10%{height: 100%;}
        } */


        header {position: absolute; max-width: 1440px; left: 50%; top: 22px; transform: translateX(-50%); display: flex; justify-content: space-between; align-items:center; width: min(1440px, calc(100% - 96px)); padding: 0 8px; box-sizing: border-box; z-index: 5;}
        header h1 {width: 58px;}
        header h1 img {width: 100%;}
        header nav {}
        header nav .gnb {display: flex; flex-direction: row; flex-wrap: nowrap; align-items: center; gap: 28px;}
        header nav .gnb li {font-size: 16px; letter-spacing: 0.05em; transition: 0.25s; text-shadow: 0 0 18px rgba(8, 7, 24, 0.95), 0 0 28px rgba(226, 204, 255, 0.2); white-space: nowrap;}
        header nav .gnb li a{position: relative; color: rgba(248, 243, 255, 0.82); display: block; padding: 8px 12px 11px; border-radius: 999px; transition: color 0.35s ease, text-shadow 0.35s ease, transform 0.35s ease;}
        header nav .gnb li a::after {content: ""; position: absolute; left: 50%; bottom: 2px; width: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255, 221, 158, 0.92), transparent); transform: translateX(-50%); opacity: 0; transition: width 0.35s ease, opacity 0.35s ease;}
        header nav .gnb li:hover a {color: #ffdd9e; text-shadow: 0 0 18px rgba(255, 221, 158, 0.28); transform: translateY(-2px);}
        header nav .gnb li:hover a::after {width: 100%; opacity: 1;}
        header audio {width: 138px; height: 24px; border-radius: 999px; opacity: 0.52; background: transparent; filter: invert(1) sepia(10%) saturate(45%) hue-rotate(210deg) brightness(0.98); box-shadow: none; transition: 0.3s;}
        header audio:hover {opacity: 0.82;}
        header audio::-webkit-media-controls-panel {background: rgba(22, 19, 45, 0.04);}
        header audio::-webkit-media-controls-current-time-display,
        header audio::-webkit-media-controls-time-remaining-display {font-size: 10px;}
        header audio::-webkit-media-controls-play-button {filter: brightness(0.62) saturate(50%);}

        .textbox {width: min(1240px, calc(100% - 96px)); position: absolute; left: 50%; top: 27%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 42px; text-align: center; z-index: 4; opacity: 1; }

        .textbox h1 {width: min(1180px, 100%); font-family: 'Cormorant Garamond', serif; font-size: clamp(58px, 6vw, 108px); font-weight: 500; letter-spacing: 0.055em; line-height: 0.96; padding: 0; color: transparent; position: relative; display: flex; flex-direction: column; align-items: center; gap: 22px; text-align: center; background: linear-gradient(100deg, rgba(244, 239, 251, 0.76), #fff, rgba(255, 221, 158, 0.86), rgba(244, 239, 251, 0.86)); background-size: 240% 100%; -webkit-background-clip: text; background-clip: text; text-shadow: 0 0 28px rgba(228, 222, 234, 0.28); animation: titleBreath 12s ease-in-out infinite alternate, titleLight 18s ease-in-out infinite;}
        .textbox h1 span {display: block; width: 100%; text-align: center;}
        /* .textbox h1 span {gap: 10px;} */
        .textbox a {font-size: 14px; letter-spacing: 0.14em; line-height: 1.45; padding: 11px 30px; color: #f7f2ff; border: 1px solid rgba(232, 222, 255, 0.5); border-radius: 999px; background: linear-gradient(120deg, rgba(246, 231, 199, 0.16), rgba(79, 73, 121, 0.34), rgba(255, 221, 158, 0.13)); background-size: 220% 100%; box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.07), 0 0 24px rgba(174, 159, 225, 0.26); backdrop-filter: blur(8px); transition: color 0.6s ease, border-color 0.6s ease, background 0.6s ease, box-shadow 0.6s ease, transform 0.6s ease; animation: buttonBreath 10s ease-in-out infinite alternate, buttonLight 16s ease-in-out infinite; }
        .textbox a:hover {color: #fff4d9; border-color: rgba(255, 216, 151, 0.86); background: linear-gradient(135deg, rgba(255, 210, 139, 0.25), rgba(53, 48, 95, 0.66)); transform: translateY(-3px); box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1), 0 0 36px rgba(255, 205, 130, 0.38);}
        .container { position: absolute; left: 50%; top: 70%; transform: translateX(-50%); width: min(1440px, calc(100% - 96px)); display: flex; flex-direction: column; align-items: center; gap: 18px; text-align: center; z-index: 4; opacity: 1; }
        .container .content {line-height: 28px;}
        .container .content p {font-size: 14px; letter-spacing: -0.04em; color: rgba(248, 243, 255, 0.86); padding: 8px; text-shadow: 0 0 18px rgba(20, 18, 42, 0.8); transition: opacity 1.2s ease;}

        @keyframes titleBreath {
            from {text-shadow: 0 0 24px rgba(228, 222, 234, 0.26), 0 0 72px rgba(170, 155, 224, 0.08);}
            to {text-shadow: 0 0 36px rgba(244, 239, 251, 0.46), 0 0 96px rgba(255, 221, 158, 0.12);}
        }

        @keyframes titleLight {
            0%, 100% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
        }

        @keyframes buttonBreath {
            from {border-color: rgba(232, 222, 255, 0.42); box-shadow: inset 0 0 14px rgba(255, 255, 255, 0.06), 0 0 22px rgba(174, 159, 225, 0.22);}
            to {border-color: rgba(255, 221, 158, 0.64); box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.09), 0 0 34px rgba(255, 221, 158, 0.22);}
        }

        @keyframes buttonLight {
            0%, 100% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
        }

        .star_box{}
        .star_box .star1{width: 100%; position: absolute; background: url("image/star.png"); height: 100vh; left: 0;top: 0; transform: translate(calc(var(--drift-x) * -0.45), calc(var(--drift-y) * -0.45)); animation: star1 28s infinite linear; background-size: 62%; opacity: 0.46; mix-blend-mode: screen; filter: blur(0.4px); pointer-events: none; z-index: 3; transition: transform 0.8s ease-out; }

        @keyframes star1 {
            0% {background-position: -120px -160px;}
            50% {opacity: 0.34;}
            100% {background-position: 180px 520px;}
        }

        /* .star_box .star2{width: 100%; position: absolute; background: url("image/star.png"); height: 100vh; left: 0;top: 0; animation: star2 3s infinite linear; background-size: 30%;}

        @keyframes star2 {
            0% {background-position: 0 0;}
            100% {background-position: 400px 900px;}
        } */

/*         .star_box .star3{width: 100%; position: absolute; background: url("image/star.png"); height: 100vh; left: 0;top: 0; animation: star3 5s infinite linear;}

        @keyframes star3 {
            0% {background-position: 0 0;}
            100% {background-position: 1000px 900px;}
        } */




        /* .textbox li span:nth-child(2){animation-delay:} */

        @media (max-width: 980px) {
            body {overflow-y: auto;}
            .wrap {min-height: 100vh;}
            header {width: calc(100% - 32px); top: 16px; flex-wrap: wrap; justify-content: center; gap: 10px 18px;}
            header h1 {width: 54px;}
            header nav {order: 3; width: 100%;}
            header nav .gnb {justify-content: center; gap: 10px;}
            header nav .gnb li {font-size: 16px;}
            header nav .gnb li a {padding: 6px 10px;}
            header audio {width: 128px;}
            .textbox {top: 28%; gap: 28px; align-items: center; text-align: center;}
            .textbox h1 {font-size: clamp(38px, 9vw, 62px); letter-spacing: 0.035em; gap: 10px; align-items: center;}
            .textbox h1 span {text-align: center;}
            .textbox h1 span:nth-child(2) {margin-left: 0;}
            .textbox a {font-size: 13px; padding: 10px 24px;}
            .container {top: 66%; width: calc(100% - 32px);}
            .container .content {line-height: 30px;}
            .container .content p {font-size: 13px;}
        }

        @media (max-width: 560px) {
            header nav .gnb {gap: 2px;}
            header nav .gnb li {font-size: 14px;}
            .textbox {top: 30%;}
            .textbox h1 {font-size: 34px; letter-spacing: 0.02em;}
            .textbox h1 span {display: block;}
            .container {top: 64%;}
        }
    </style>
</head>
<body>
    <div class="opening" aria-hidden="true">
        <img src="image/logo1.png" alt="">
    </div>
    <div class="wrap">
        
        <header>
            <h1><a href="index.html"><img src="image/logo1.png" alt="Inner Stillness"></a></h1>
            <nav>
                <ul class="gnb">
                    <li><a href="study.html">서제</a></li>
                    <li><a href="works.html">작품</a></li>
                    <li><a href="records.html">기록</a></li>
                    <li><a href="scenery.html">사운드</a></li>
                    <li><a href="connect.html">연결</a></li>
                </ul>
            </nav>
            <audio src="audio/massobeats_dainty.m4a" controls></audio>
        </header>


        <div class="textbox">  
            <h1>
                <span>MEET YOUR</span> 
                <span>INNER STILLNESS</span> 
            </h1>
            <a href="study.html">S T A R T<br>M E D I T A T I O N</a>
        </div>
        <div class="container">
            <div class="content">
                <p>우리는 모두 각자의 내면에 광활한 우주를 품고 있습니다.  <br> 어둠 속에 숨겨진 진정한 나를 마주하고, 쏟아지는 별빛 속에서 답을 찾아보세요. <br>당신의 깊은 내면이 들려주는 고요한 이야기에 집중할 시간입니다.</p>
            </div>
        </div>
        <div class="bg_box">
            <div class="bg1">
                <div class="sky"><img src="image/bg1.png" alt=""></div>
                <img src="image/bg2.png" alt="" class="img2">
            </div>
        </div>

        <div class="star_box">
            <div class="star1"></div>
            <div class="star2"></div>
        </div>
    </div>
    <script>
        const wrap = document.querySelector('.wrap');
        const opening = document.querySelector('.opening');
        const message = document.querySelector('.container .content p');
        const messages = [
            '우리는 모두 각자의 내면에 광활한 우주를 품고 있습니다.<br>어둠 속에 숨겨진 진정한 나를 마주하고, 쏟아지는 별빛 속에서 답을 찾아보세요.<br>당신의 깊은 내면이 들려주는 고요한 이야기에 집중할 시간입니다.',
            '잠깐 멈추면 마음의 방향이 조금 더 선명해집니다.<br>오늘의 감정과 호흡을 천천히 살피며, 나를 가꾸는 시간을 시작해보세요.<br>고요는 멀리 있는 것이 아니라 지금 돌아오는 감각입니다.',
            '내면을 돌보는 일은 거창하지 않아도 괜찮습니다.<br>한 문장, 한 번의 숨, 작은 기록이 오늘의 나를 부드럽게 정리합니다.<br>필요한 만큼 천천히 머물러보세요.'
        ];
        let messageIndex = 0;
        let messageTimer;

        window.addEventListener('pointermove', (event) => {
            const x = (event.clientX / window.innerWidth - 0.5) * 18;
            const y = (event.clientY / window.innerHeight - 0.5) * 14;
            wrap.style.setProperty('--drift-x', `${x}px`);
            wrap.style.setProperty('--drift-y', `${y}px`);
        });

        const startMessageRotation = () => {
            if (messageTimer) {
                return;
            }

            messageTimer = setInterval(() => {
                messageIndex = (messageIndex + 1) % messages.length;
                message.style.opacity = '0';
                setTimeout(() => {
                    message.innerHTML = messages[messageIndex];
                    message.style.opacity = '1';
                }, 1200);
            }, 8200);
        };

        opening.addEventListener('animationstart', (event) => {
            if (event.animationName === 'openingFade') {
                document.body.classList.add('page-ready');
                startMessageRotation();
            }
        });

        opening.addEventListener('animationend', (event) => {
            if (event.animationName === 'openingFade') {
                opening.remove();
            }
        });

        if (document.documentElement.classList.contains('skip-opening')) {
            document.body.classList.add('page-ready');
            opening.remove();
            startMessageRotation();
        }
    </script>
</body>
</html>
