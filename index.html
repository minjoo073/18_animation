<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0;padding: 0;}
        li{list-style: none;}
        a {text-decoration: none; color: #000;}
        img {vertical-align: top;}
        html, body {height: 100%;}

       /*  html, body {height: 100%;} 배경 사이즈 크기 맞추기 위함*/

       /*  body{overflow-y: hidden;} /* 이미지 크기가 커서 스크롤 바가 생길 경우 */
       /* vh는 이미지가 작을 때 (높이) 사용 */
  
        @font-face {
            font-family: 'GyeonggiMillenniumBackground';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-3@1.0/Batang_Regular.woff') format('woff');
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: 'GyeonggiMillenniumBackground';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-3@1.0/Batang_Bold.woff') format('woff');
            font-weight: 700;
            font-display: swap;
        }
        body {font-family: 'GyeonggiMillenniumBackground'; overflow: hidden;}
        .bg_box {position: absolute; top: 0; width: 100%; height: 100%; overflow: hidden;}

        .bg_box .bg1 .sky { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); animation: rain 60s linear infinite; transform-origin: center center;}
        @keyframes rain {
            from {transform: translate(-50%, -50%) rotate(0deg);}
            to {transform: translate(-50%, -50%) rotate(360deg);}
        }
        
        .bg_box .bg1 .img2 { width: 100%; height: 100vh; position: absolute;left: 0;top: 0;z-index: 2; animation: bg1 15s forwards; animation-delay: 1ms;}
        /* @keyframes bg1 {
            0% {height: 150%;}
            10%{height: 100%;}
        } */


        header {position: absolute; max-width: 1400px; left: 50%; transform: translateX(-50%); display: flex; justify-content: space-between; width: 100%; align-content:center; z-index: 3;}
        header h1 {width: 100px;}
        header h1 img {width: 100%;}
        header nav {}
        header nav .gnb {display: flex;}
        header nav .gnb li {font-size: 22px; transition: 0.25; text-shadow: 0 0 20px rgba(0, 0, 0, 1);}
        header nav .gnb li a{color: #fff; display: block; padding: 10px 30px;}

        header nav .gnb:hover  li{transform: scale(0.9);opacity: 0.7;}
        header nav .gnb li:hover {transform: scale(1.1); opacity: 1;}
        header nav .gnb li:hover a {color: #ff9f28;}

        .textbox {width: 100%; position: absolute; left: 50px; top: 30%;  display: flex; flex-direction: column; align-items: center; gap: 20px; text-align: center; z-index: 3; }

        .textbox h1 {font-size: 60px; padding: 20px; color: #d3cbd9; animation:text 3s; position: relative; display: flex; gap: 1em;}
        /* .textbox h1 span {gap: 10px;} */
        .textbox a {font-size: 20px; padding: 10px; border-top: 1px solid #000; border-bottom: 1px solid #000; animation:text 3s; }


         @keyframes text { 
            0% {margin-left: -300PX; transform: rotate(20deg) scale(0.3); top: 100px; opacity: 0;}

            100% {margin-left: 0; transform: rotate(0) scale(1); top: 0; opacity: 1;}
        }


        .container { position: absolute; right: 35%; top: 70%; display: flex; flex-direction: column; align-items: center; gap: 20px; text-align: center; text-align: center; z-index: 3; }
        .container .content {line-height: 50px;}
        .container .content p {font-size: 18px; color: #d3cbd9; padding: 10px;}

        .star_box{}
        .star_box .star1{width: 100%; position: absolute; background: url("image/star.png"); height: 100vh; left: 0;top: 0; animation: star1 10s infinite linear; background-size: 70%; z-index: 3; }

        @keyframes star1 {
            0% {background-position: 0 0;}
            100% {background-position: 300px 900px;}
        }

        /* .star_box .star2{width: 100%; position: absolute; background: url("image/star.png"); height: 100vh; left: 0;top: 0; animation: star2 3s infinite linear; background-size: 30%;}

        @keyframes star2 {
            0% {background-position: 0 0;}
            100% {background-position: 400px 900px;}
        } */

/*         .star_box .star3{width: 100%; position: absolute; background: url("image/star.png"); height: 100vh; left: 0;top: 0; animation: star3 5s infinite linear;}

        @keyframes star3 {
            0% {background-position: 0 0;}
            100% {background-position: 1000px 900px;}
        } */




        /* .textbox li span:nth-child(2){animation-delay:} */
    </style>
</head>
<body>
    <div class="wrap">
        
        <header>
            <h1><img src="image/logo1.png" alt=""></h1>
            <nav>
                <ul class="gnb">
                    <li><a href="#">서제</a></li>
                    <li><a href="#">작품</a></li>
                    <li><a href="#">기록</a></li>
                    <li><a href="#">풍경</a></li>
                    <li><a href="#">연결</a></li>
                </ul>
            </nav>
            <audio src="audio/massobeats_dainty.m4a" controls></audio>
        </header>


        <div class="textbox">  
            <h1>
                <span>M E E T</span> 
                <span>Y O U R</span> 
                <span>I N N E R</span> 
                <span>S T I L L N E S S</span> 
            </h1>
            <a href="">S T A R T<br>M E D I T A T I O N</a>
        </div>
        <div class="container">
            <div class="content">
                <p>우리는 모두 각자의 내면에 광활한 우주를 품고 있습니다.  <br> 어둠 속에 숨겨진 진정한 나를 마주하고, 쏟아지는 별빛 속에서 답을 찾아보세요. <br>당신의 깊은 내면이 들려주는 고요한 이야기에 집중할 시간입니다.</p>
            </div>
        </div>
        <div class="bg_box">
            <div class="bg1">
                <div class="sky"><img src="image/bg1.png" alt=""></div>
                <img src="image/bg2.png" alt="" class="img2">
            </div>
        </div>

        <div class="star_box">
            <div class="star1"></div>
            <div class="star2"></div>
        </div>
    </div>
</body>
</html>
